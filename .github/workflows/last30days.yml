name: Last 30 Days Trending

on:
    schedule:
        - cron: '37 11 * * *' # 04:37 PDT (UTC-7)
    workflow_dispatch: # Allow manual trigger

jobs:
    research:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                  npm install -g @anthropic-ai/claude-code
                  python3 -m pip install -U "yt-dlp[default]"

            - name: Install last30days plugin
              env:
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              run: |
                  claude plugin marketplace add mvanhorn/last30days-skill
                  claude plugin install last30days@last30days-skill

            - name: Run last30days
              env:
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  ANTHROPIC_MODEL: claude-haiku-4-5
                  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
                  XAI_MODEL_POLICY: pinned
                  XAI_MODEL_PIN: grok-4-1-fast-non-reasoning
                  PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  TOPICS: ${{ vars.TOPICS }}
              run: bash last30days.sh
